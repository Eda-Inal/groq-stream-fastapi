version: "3.9"

services:
  api:
    build: .
    container_name: groq_stream_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      - db
      - tool-server

  tool-server:
    build: .
    container_name: groq_stream_tool_server
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.tool_server.main:app --host 0.0.0.0 --port 8001
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg15
    container_name: groq_stream_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
